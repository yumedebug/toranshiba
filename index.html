<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Transceiver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ボタンなどの不要な長押しメニューを禁止 */
        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* 録音中のボタンアニメーション */
        .recording-pulse { 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7), inset 0 5px 10px rgba(255,255,255,0.2); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0), inset 0 5px 10px rgba(255,255,255,0.2); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0), inset 0 5px 10px rgba(255,255,255,0.2); }
        }

        /* 押下時のスタイル微調整 */
        .ptt-active {
            transform: scale(0.92) !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset 0 10px 20px rgba(0,0,0,0.6) !important;
            background-image: linear-gradient(to bottom, #b91c1c, #991b1b) !important;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased min-h-screen flex flex-col items-center justify-center p-4">

        <h1 class="text-2xl font-bold mb-2 text-white">Web Transceiver</h1>
        <p class="text-gray-400 text-sm mb-8 text-center leading-relaxed">
            同じパスワードを入力した相手と<br>トランシーバー通信ができます。
        </p>
        
        <div class="w-full mb-6">
            <label class="block text-gray-400 text-xs font-bold mb-2 uppercase tracking-wider" for="password-input">
                Channel Password
            </label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-key text-gray-500"></i>
                </div>
                <input type="text" id="password-input" class="w-full bg-gray-900 text-white border border-gray-600 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-colors" placeholder="半角英数字で入力..." autocomplete="off" />
            </div>
        </div>
        
        <button id="connect-btn" class="w-full bg-green-600 hover:bg-green-500 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-bold py-4 px-4 rounded-xl transition-colors shadow-lg flex justify-center items-center gap-2">
            <i class="fas fa-signal"></i> 通信を開始する
        </button>
        <div id="login-error" class="text-red-400 text-sm mt-4 text-center hidden bg-red-900/30 p-2 rounded w-full"></div>
    </div>

    <div id="transceiver-screen" class="hidden flex-col items-center max-w-sm w-full relative bg-gray-800 rounded-3xl pb-10 shadow-2xl border border-gray-700 overflow-hidden">

            </div>
            <button id="disconnect-btn" class="text-gray-400 hover:text-red-400 text-sm transition-colors flex items-center gap-1 bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">
                <i class="fas fa-power-off"></i> 切断
            </button>
        </div>
        
        <div class="relative w-56 mt-8 mb-6 flex justify-center items-center">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjLomdDIwGTXWN_rkXzP9oOwNlRxMW3LC3aOOQ35Sz0-f91WUCxu8-vgnWUOg9MXPpHxEoCl5EyslTSJeMRX9_ZHuDKooSSLsHGEIn0Gxb5zJ0B-sGpUzYA7Z2E36eZP6gHclOsHRC1rixE/s800/machine_transceiver.png"

            <div class="absolute -right-2 bottom-4 bg-gray-900 border border-gray-600 rounded-xl p-3 flex flex-col items-center shadow-xl z-20 no-select">
                <div id="status-light" class="w-6 h-6 rounded-full bg-gray-600 shadow-[inset_0_3px_5px_rgba(0,0,0,0.5)] mb-2 transition-colors duration-200"></div>
                <span id="status-text" class="text-[11px] text-gray-300 font-mono font-bold tracking-wider">STANDBY</span>
            </div>
        </div>

        <button id="ptt-btn" class="mt-4 w-36 h-36 bg-gradient-to-b from-red-500 to-red-700 rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(0,0,0,0.5),inset_0_5px_10px_rgba(255,255,255,0.3)] border-4 border-red-900 no-select transition-transform duration-75 text-white font-bold text-2xl tracking-wider relative group outline-none">
            <div class="z-10 pointer-events-none drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] leading-tight text-center flex flex-col items-center">
                <i class="fas fa-microphone mb-1 text-xl opacity-80"></i>
                <span class="block">PUSH</span>
                <span class="text-xs tracking-widest mt-0.5 text-gray-200">TO TALK</span>
            </div>
        </button>
        
        <p class="text-gray-500 text-xs mt-8 px-8 text-center leading-relaxed no-select">
            ボタンを<strong class="text-gray-300">押している間だけ</strong>録音・送信します。<br>
            受信中は送信できません。
        </p>
    </div>

    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none w-max"></div>
