<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Transceiver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .ptt-active { transform: scale(0.92) !important; background-image: linear-gradient(to bottom, #b91c1c, #991b1b) !important; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="login-screen" class="flex flex-col items-center bg-gray-800 p-8 rounded-3xl shadow-2xl max-w-sm w-full border border-gray-700">
        <div class="w-16 h-16 bg-gray-700 rounded-full flex items-center justify-center mb-4">
            <i class="fas fa-walkie-talkie text-3xl text-green-400"></i>
        </div>
        <h1 class="text-2xl font-bold mb-2">Web Transceiver</h1>
        <p class="text-gray-400 text-sm mb-8 text-center">同じパスワードで通信できます。</p>
        
        <div class="w-full mb-6">
            <label class="block text-gray-400 text-xs font-bold mb-2 uppercase">Channel Password</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center"><i class="fas fa-key text-gray-500"></i></div>
                <input type="text" id="password-input" class="w-full bg-gray-900 text-white border border-gray-600 rounded-xl pl-10 pr-4 py-3 focus:outline-none" placeholder="半角英数字で入力..." />
            </div>
        </div>
        
        <button id="connect-btn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg flex justify-center items-center gap-2">
            <i class="fas fa-signal"></i> 通信を開始する
        </button>
        <div id="login-error" class="text-red-400 text-sm mt-4 text-center hidden bg-red-900/30 p-2 rounded w-full"></div>
    </div>

    <div id="transceiver-screen" class="hidden flex-col items-center max-w-sm w-full bg-gray-800 rounded-3xl pb-10 shadow-2xl border border-gray-700 overflow-hidden">
        <div class="bg-gray-900 w-full p-5 flex justify-between items-center border-b border-gray-700">
            <div class="text-green-400 font-mono font-bold text-lg">
                <i class="fas fa-broadcast-tower mr-2"></i> CH-<span id="current-channel" class="ml-1 uppercase">---</span>
            </div>
            <button id="disconnect-btn" class="text-gray-400 hover:text-red-400 text-sm bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">
                <i class="fas fa-power-off"></i> 切断
            </button>
        </div>
        
        <div class="relative w-56 mt-8 mb-6 flex justify-center items-center">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjLomdDIwGTXWN_rkXzP9oOwNlRxMW3LC3aOOQ35Sz0-f91WUCxu8-vgnWUOg9MXPpHxEoCl5EyslTSJeMRX9_ZHuDKooSSLsHGEIn0Gxb5zJ0B-sGpUzYA7Z2E36eZP6gHclOsHRC1rixE/s800/machine_transceiver.png" class="w-full object-contain pointer-events-none" />
            <div class="absolute -right-2 bottom-4 bg-gray-900 border border-gray-600 rounded-xl p-3 flex flex-col items-center shadow-xl no-select">
                <div id="status-light" class="w-6 h-6 rounded-full bg-green-500 shadow-lg mb-2"></div>
                <span id="status-text" class="text-[11px] text-green-400 font-mono font-bold">STANDBY</span>
            </div>
        </div>

        <button id="ptt-btn" class="mt-4 w-36 h-36 bg-gradient-to-b from-red-500 to-red-700 rounded-full flex items-center justify-center border-4 border-red-900 no-select text-white font-bold text-2xl relative outline-none">
            <div class="z-10 pointer-events-none text-center">
                <i class="fas fa-microphone mb-1 text-xl"></i>
                <span class="block">PUSH</span>
                <span class="text-xs mt-0.5 text-gray-200">TO TALK</span>
            </div>
        </button>
    </div>

    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 w-max"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCdz8LYnBOwGzMXUwQj-d11KKySSlR9Dvs",
            authDomain: "my-toranshiba.firebaseapp.com",
            projectId: "my-toranshiba",
            storageBucket: "my-toranshiba.firebasestorage.app",
            messagingSenderId: "149800877079",
            appId: "1:149800877079:web:b698517a9f8c321d35f052"
        };

        const appId = 'my-toranshiba'; 

        const loginScreen = document.getElementById('login-screen');
        const transceiverScreen = document.getElementById('transceiver-screen');
        const passwordInput = document.getElementById('password-input');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const pttBtn = document.getElementById('ptt-btn');
        const currentChannelEl = document.getElementById('current-channel');
        const statusLight = document.getElementById('status-light');
        const statusText = document.getElementById('status-text');
        const loginError = document.getElementById('login-error');
        const toastContainer = document.getElementById('toast-container');

        let currentUser = null;
        let currentChannel = '';
        let unsubscribeSnapshot = null;
        let db, auth;
        let joinTimestamp = 0;
        
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let isPlaying = false;
        let audioQueue = [];

        // 起動時にまずFirebaseを即初期化
        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            // バックグラウンドで勝手にログインさせる
            signInAnonymously(auth).then(cred => {
                currentUser = cred.user;
            }).catch(e => {
                console.error(e);
                // 失敗してもボタンは押せるようにエラー表示だけに留める
                showError("匿名ログインに失敗しました。リロードしてください。");
            });
        } catch (err) {
            console.error(err);
            showError("Firebaseの初期化に失敗しました。");
        }

        function showError(msg) {
            loginError.innerText = msg;
            loginError.classList.remove('hidden');
        }

        function showToast(msg, type="info") {
            const toast = document.createElement('div');
            toast.className = `bg-gray-800 border border-gray-600 text-white px-4 py-3 rounded-xl shadow-2xl text-sm flex items-center justify-center`;
            toast.innerHTML = `<span>${msg}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function setStatus(state) {
            statusLight.className = "w-6 h-6 rounded-full mb-2";
            if (state === 'STANDBY') {
                statusLight.classList.add('bg-green-500');
                statusText.innerText = "STANDBY";
            } else if (state === 'RECORDING') {
                statusLight.classList.add('bg-red-500');
                statusText.innerText = "TX (送信中)";
            } else if (state === 'PLAYING') {
                statusLight.classList.add('bg-yellow-400');
                statusText.innerText = "RX (受信中)";
            }
        }
        
        // ボタンクリックイベント
        connectBtn.addEventListener('click', async () => {
            loginError.classList.add('hidden');
            const pwd = passwordInput.value.trim();
            
            if(!pwd) {
                showError("パスワードを入力してください");
                return;
            }
            
            const safeChannel = pwd.replace(/[^a-zA-Z0-9]/g, '');
            if(!safeChannel) {
                showError("パスワードは半角英数字で入力してください");
                return;
            }

            // もしログインがまだ完了していなければ、ここで強制的に再ログインを試みる
            if (!currentUser && auth) {
                try {
                    const cred = await signInAnonymously(auth);
                    currentUser = cred.user;
                } catch(e) {
                    showError("サーバーへの接続がタイムアウトしました。もう一度押してください。");
                    return;
                }
            }

            // マイクが使える環境かチェック
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError("このブラウザ環境はマイクに対応していません。https でアクセスしているか確認してください。");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                let mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
                mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = processAudioAndSend;
            } catch (err) {
                showError("マイクの許可が拒否されました。設定を確認してください。");
                return;
            }

            currentChannel = safeChannel;
            currentChannelEl.innerText = safeChannel;
            
            loginScreen.classList.add('hidden');
            transceiverScreen.classList.remove('hidden');
            transceiverScreen.classList.add('flex');
            
            setStatus('STANDBY');
            startListening(safeChannel);
        });

        disconnectBtn.addEventListener('click', () => {
            location.reload(); // 確実にすべてをリセットするため、切断時はページごとリロード
        });

        function startListening(channelName) {
            joinTimestamp = Date.now();
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', `walkietalkie_${channelName}`);
            unsubscribeSnapshot = onSnapshot(colRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (data.sender !== currentUser.uid && data.clientTimestamp > joinTimestamp) {
                            audioQueue.push(data.audioData);
                            if (!isPlaying && !isRecording) playNextAudio();
                        }
                    }
                });
            });
        }

        function playNextAudio() {
            if (audioQueue.length === 0) { isPlaying = false; setStatus('STANDBY'); return; }
            isPlaying = true;
            setStatus('PLAYING');
            const audio = new Audio(audioQueue.shift());
            audio.onended = () => playNextAudio();
            audio.onerror = () => playNextAudio();
            audio.play().catch(() => playNextAudio());
        }

        // 録音ロジック
        function startRecording(e) {
            if (e && e.cancelable) e.preventDefault();
            if (!mediaRecorder || isRecording || isPlaying) return;
            isRecording = true;
            audioChunks = [];
            pttBtn.classList.add('ptt-active', 'recording-pulse');
            setStatus('RECORDING');
            mediaRecorder.start();
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            pttBtn.classList.remove('ptt-active', 'recording-pulse');
            setStatus('STANDBY');
            if (mediaRecorder.state !== "inactive") mediaRecorder.stop();
        }

        pttBtn.addEventListener('mousedown', startRecording);
        window.addEventListener('mouseup', stopRecording);
        pttBtn.addEventListener('touchstart', startRecording, { passive: false });
        pttBtn.addEventListener('touchend', stopRecording);

        async function processAudioAndSend() {
            if (audioChunks.length === 0) return;
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
            if (audioBlob.size < 500) return;
            
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', `walkietalkie_${currentChannel}`);
                    await addDoc(colRef, {
                        audioData: reader.result,
                        sender: currentUser.uid,
                        clientTimestamp: Date.now(),
                        timestamp: serverTimestamp()
                    });
                } catch (err) {
                    showToast("送信失敗。ルールを確認してください。");
                }
            };
        }
    </script>
</body>
</html>
